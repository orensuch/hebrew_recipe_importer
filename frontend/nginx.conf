server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> backend service.
    # Use Docker's embedded DNS (127.0.0.11) + a variable in proxy_pass so nginx
    # re-resolves the backend's IP at request time. Without this, nginx caches
    # the backend IP at startup; when the backend container is rebuilt it gets a
    # new IP and nginx keeps hitting the old one ("502 Host is unreachable").
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Parsing can be slow on bigger models.
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;

        # Stream NDJSON status events to the browser as they happen.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
