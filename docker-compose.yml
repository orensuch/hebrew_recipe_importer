services:
  backend:
    build: ./backend
    environment:
      # Points at the Ollama running on your host machine (see extra_hosts).
      OLLAMA_HOST: ${OLLAMA_HOST:-http://192.168.1.23:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-300}
      MAX_CONTENT_CHARS: ${MAX_CONTENT_CHARS:-14000}
      # Mealie: where the backend reaches it, and the browser-facing URL for links.
      MEALIE_URL: ${MEALIE_URL:-http://192.168.1.23:1189}
      MEALIE_PUBLIC_URL: ${MEALIE_PUBLIC_URL:-http://192.168.1.23:1189}
      MEALIE_API_TOKEN: ${MEALIE_API_TOKEN:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJsb25nX3Rva2VuIjp0cnVlLCJpZCI6IjQyNDMxNDllLTRlNjQtNDhjMS1hMzlhLTNjYjhmMzBkNGQyOSIsIm5hbWUiOiJyZWNpcGUgcGFyc2VyIiwiaW50ZWdyYXRpb25faWQiOiJnZW5lcmljIiwiZXhwIjoxOTM5OTg5MzA4fQ.PD_co5MqraYZpBDDKrZc4rvr3C6jYe-yDBn33dJFsvw}
      MEALIE_GROUP: ${MEALIE_GROUP:-home}
    extra_hosts:
      # Lets the container resolve the host's Ollama on Linux too.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${WEB_PORT:-8083}:80"
    depends_on:
      - backend
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Prefer your existing local Ollama (the default above). If instead you want
# Ollama to run *inside* compose, uncomment the service below, set
# OLLAMA_HOST=http://ollama:11434 in your .env, then `docker compose exec
# ollama ollama pull gemma2:9b`. Add a `gpus: all` deploy block for GPU.
# ---------------------------------------------------------------------------
